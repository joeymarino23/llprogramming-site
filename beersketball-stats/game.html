<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Game Stats – Beersketball</title>

  <style>
    :root {
      --page-max-width: 1400px;
      --page-padding: 20px;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --bg-top: #eef4ff;
      --bg-bottom: #f8fafc;
      --text: #0f172a;
      --muted: #5b6474;
      --rule: rgba(15, 23, 42, 0.1);
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 12px 24px rgba(15, 23, 42, 0.05);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --accent: #b91c1c;
      --accent-2: #1d4ed8;
      --accent-3: #f59e0b;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      background:
        radial-gradient(circle at top left, rgba(185, 28, 28, 0.11), transparent 26%),
        radial-gradient(circle at top right, rgba(29, 78, 216, 0.1), transparent 28%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, select { font: inherit; }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--rule);
    }

    .top-nav-inner {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-weight: 900;
      letter-spacing: 0.02em;
      font-size: 14px;
      color: #0f172a;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-links a {
      font-size: 14px;
      color: #334155;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .nav-links a:hover {
      background: #f1f5f9;
      text-decoration: none;
    }

    .hero-shell,
    .section-shell,
    .footer-shell {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding-left: var(--page-padding);
      padding-right: var(--page-padding);
    }

    .hero {
      padding: 32px 0 22px 0;
    }

    .hero-panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(140deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.88)),
        linear-gradient(140deg, rgba(185, 28, 28, 0.4), rgba(29, 78, 216, 0.35));
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
      color: #ffffff;
    }

    .hero-panel::before,
    .hero-panel::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
    }

    .hero-panel::before {
      width: 320px; height: 320px;
      top: -120px; right: -70px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.26), transparent 70%);
    }

    .hero-panel::after {
      width: 280px; height: 280px;
      bottom: -130px; left: -70px;
      background: radial-gradient(circle, rgba(185, 28, 28, 0.32), transparent 72%);
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      padding: 26px;
      display: grid;
      gap: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .back-link:hover {
      color: #ffffff;
      text-decoration: none;
    }

    .game-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.86);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .game-badge::before {
      content: "";
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.14);
    }

    .matchup {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .matchup-team-name {
      display: block;
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .matchup-team-result {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 13px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.55);
    }

    .matchup-team-result.is-winner {
      color: #4ade80;
    }

    .matchup-score {
      display: grid;
      place-items: center;
      padding: 14px 20px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -0.05em;
      white-space: nowrap;
    }

    .game-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.6);
      font-size: 13px;
    }

    .game-meta-label {
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-size: 11px;
      margin-right: 5px;
    }

    main { padding-bottom: 56px; }

    .section-shell { margin-top: 24px; }

    .status-banner {
      display: none;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--rule);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
    }

    .status-banner.is-visible { display: block; }

    .status-banner[data-tone="loading"] {
      border-color: rgba(29, 78, 216, 0.14);
      background: rgba(219, 234, 254, 0.56);
    }

    .status-banner[data-tone="error"] {
      border-color: rgba(185, 28, 28, 0.16);
      background: rgba(254, 226, 226, 0.72);
    }

    .status-banner[data-tone="warning"] {
      border-color: rgba(245, 158, 11, 0.18);
      background: rgba(254, 243, 199, 0.82);
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .table-container {
      border-radius: var(--radius-lg);
      border: 1px solid var(--rule);
      background: var(--surface);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-scroll {
      overflow-x: auto;
    }

    .stats-table {
      border-collapse: collapse;
      width: 100%;
      min-width: max-content;
      font-size: 12px;
    }

    .stats-table th,
    .stats-table td {
      padding: 7px 9px;
      text-align: center;
      white-space: nowrap;
      border-right: 1px solid rgba(15, 23, 42, 0.08);
    }

    .stats-table th:last-child,
    .stats-table td:last-child {
      border-right: none;
    }

    .stats-table thead th {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #1a1a1a;
      border-bottom: 2px solid rgba(15, 23, 42, 0.15);
    }

    .stats-table th.col-name,
    .stats-table td.col-name {
      text-align: left;
      position: sticky;
      left: 0;
      z-index: 2;
      min-width: 140px;
      max-width: 200px;
      background: var(--surface-strong);
      border-right: 2px solid rgba(15, 23, 42, 0.12);
    }

    .stats-table thead th.col-name {
      z-index: 3;
      background: #1e293b;
      color: #ffffff;
      border-right-color: rgba(255, 255, 255, 0.1);
    }

    .stats-table tr.team-row td {
      background: #1e293b;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 800;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: left;
      padding: 10px 12px;
    }

    .stats-table tr.team-row td.col-name {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #1e293b;
    }

    .stats-table tbody tr.player-row:nth-child(even) td {
      background: rgba(15, 23, 42, 0.025);
    }

    .stats-table tbody tr.player-row:nth-child(even) td.col-name {
      background: #f8fafc;
    }

    .stats-table tbody tr.player-row:hover td {
      background: rgba(29, 78, 216, 0.05);
    }

    .stats-table tbody tr.player-row:hover td.col-name {
      background: rgba(29, 78, 216, 0.06);
    }

    .stats-table td.col-name {
      font-weight: 700;
      font-size: 12px;
    }

    .period-section { margin-top: 24px; }

    .site-footer {
      padding: 0 0 48px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .footer-shell { text-align: center; }

    .is-hidden { display: none !important; }

    @media (max-width: 860px) {
      .matchup {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .matchup-score { justify-self: start; }
    }

    @media (max-width: 560px) {
      :root { --page-padding: 14px; }
      .top-nav-inner { padding: 10px 14px; }
      .hero { padding-top: 18px; }
      .hero-inner { padding: 20px; }
    }
  </style>
</head>

<body>
  <header id="site-header" class="top-nav"></header>

  <main>
    <section class="hero">
      <div class="hero-shell">
        <div class="hero-panel">
          <div class="hero-inner">
            <a href="/beersketball-stats/" class="back-link">&#8592; Back to Stats</a>
            <div id="heroGameContent">
              <p style="color:rgba(255,255,255,0.65);margin:0;">Loading game data&#8230;</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-shell">
      <div id="statusBanner" class="status-banner" role="status" aria-live="polite"></div>
    </section>

    <section class="section-shell is-hidden" id="fullGameSection" aria-labelledby="fullGameTitle">
      <div class="section-head">
        <h2 id="fullGameTitle" class="section-title">Full Game Stats</h2>
      </div>
      <div class="table-container">
        <div class="table-scroll">
          <div id="fullGameTable"></div>
        </div>
      </div>
    </section>

    <div id="periodsContainer" class="section-shell"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-shell">Created by L&amp;L Programming LLC.</div>
  </footer>

  <script src="/header.js?v=5"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    (function () {
      var firebaseConfig = {
        apiKey: "AIzaSyCybP5U8jqQdyxo1xYA6HUqRiH3ulhUQYo",
        authDomain: "beersketball-2347a.firebaseapp.com",
        databaseURL: "https://beersketball-2347a-default-rtdb.firebaseio.com",
        projectId: "beersketball-2347a",
        storageBucket: "beersketball-2347a.firebasestorage.app",
        messagingSenderId: "404436634275",
        appId: "1:404436634275:web:9dbf85edd354004f0e8d16",
        measurementId: "G-PSEMQTX1PV"
      };

      var COLUMNS = [
        { header: "Player Name", field: "displayName",           color: null,      isName: true },
        { header: "Total",       field: "score",                  color: "#C58EFF"              },
        { header: "SC",          field: "scoredPoints",           color: null                   },
        { header: "AST",         field: "assists",                color: null                   },
        { header: "Overall",     field: "_overallPct",            color: "#B8B8B8", computed: true },
        { header: "RA",          field: "reboundAttempts",        color: "#B8B8B8"              },
        { header: "Reb",         field: "reboundsMade",           color: "#B8B8B8"              },
        { header: "RB %",        field: "reboundPct",             color: "#FFC58E", isPct: true  },
        { header: "KOA",         field: "knockOutAttempts",       color: "#FFC500"              },
        { header: "SV",          field: "saves",                  color: null                   },
        { header: "KO %",        field: "savePct",                color: "#FF5B00", isPct: true  },
        { header: "FTA",         field: "freeThrowAttempts",      color: "#01C5FF"              },
        { header: "FT",          field: "freeThrowsMade",         color: null                   },
        { header: "FT %",        field: "freeThrowPct",           color: "#C5FFFF", isPct: true  },
        { header: "ATT",         field: "attempts",               color: null                   },
        { header: "DN",          field: "attemptsMade",           color: "#FFFF8E"              },
        { header: "DL %",        field: "attemptPct",             color: "#8EC500", isPct: true  },
        { header: "UTA",         field: "upTopAttempts",          color: null                   },
        { header: "UTD",         field: "upTopMade",              color: "#FFFF00"              },
        { header: "UT %",        field: "upTopPct",               color: "#8EC500", isPct: true  },
        { header: "FA",          field: "foulAttempts",           color: null                   },
        { header: "FL",          field: "foulsMade",              color: "#B8B8B8"              },
        { header: "FO %",        field: "foulPct",                color: "#8B8B8B", isPct: true  },
        { header: "CA",          field: "conversionAttempts",     color: null                   },
        { header: "CV",          field: "conversionMade",         color: "#FFFF00"              },
        { header: "CV %",        field: "conversionPct",          color: "#8EC500", isPct: true  },
        { header: "S",           field: "singles",                color: "#FFFF00"              },
        { header: "2X",          field: "doubles",                color: "#FFC58E"              },
        { header: "TRIP",        field: "triples",                color: "#01C5FF"              },
        { header: "FIVE",        field: "fives",                  color: "#FFB800"              },
        { header: "UTT",         field: "_utt",                   color: null,      computed: true },
        { header: "ST",          field: "standees",               color: "#FF00FF"              },
        { header: "P",           field: "penalties",              color: "#8EC500"              },
        { header: "PA",          field: "penaltyShotsAttempted",  color: "#8EC500"              },
        { header: "PM",          field: "penaltyShotsMade",       color: "#8EC500"              },
        { header: "P %",         field: "penaltyShotPct",         color: null,      isPct: true  },
        { header: "DC",          field: "deadCans",               color: "#8B8B8B"              }
      ];

      var el = {
        heroGameContent: document.getElementById("heroGameContent"),
        statusBanner:    document.getElementById("statusBanner"),
        fullGameSection: document.getElementById("fullGameSection"),
        fullGameTable:   document.getElementById("fullGameTable"),
        periodsContainer: document.getElementById("periodsContainer")
      };

      function getParam(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
      }

      function esc(val) {
        return String(val)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function fmtDate(iso) {
        if (!iso) return "Unknown";
        var d = new Date(iso);
        if (isNaN(d.getTime())) return "Unknown";
        return new Intl.DateTimeFormat("en-US", { dateStyle: "medium", timeStyle: "short" }).format(d);
      }

      function setStatus(msg, tone) {
        el.statusBanner.textContent = msg;
        el.statusBanner.dataset.tone = tone || "loading";
        el.statusBanner.classList.add("is-visible");
      }

      function clearStatus() {
        el.statusBanner.classList.remove("is-visible");
      }

      function cellValue(col, player) {
        if (col.field === "_utt") return "--";
        if (col.field === "_overallPct") {
          var att = Number(player.reboundAttempts) || 0;
          var made = Number(player.reboundsMade) || 0;
          return att === 0 ? "--" : (made / att * 100).toFixed(1) + "%";
        }
        var val = player[col.field];
        if (val === null || val === undefined || val === "") return "--";
        if (col.isPct) {
          var n = Number(val);
          return isNaN(n) ? "--" : n.toFixed(1) + "%";
        }
        return esc(String(val));
      }

      function buildTable(playersObj, teamOne, teamTwo) {
        var t1 = [], t2 = [], other = [];
        Object.keys(playersObj || {}).forEach(function (pid) {
          var p = Object.assign({ _id: pid }, playersObj[pid]);
          if (p.team === teamOne) t1.push(p);
          else if (p.team === teamTwo) t2.push(p);
          else other.push(p);
        });

        function byScore(a, b) { return (Number(b.score) || 0) - (Number(a.score) || 0); }
        t1.sort(byScore); t2.sort(byScore);

        var thead = COLUMNS.map(function (col) {
          var bg = col.color ? "background:" + col.color + ";" : "background:#e2e8f0;";
          var cls = col.isName ? ' class="col-name"' : "";
          return "<th" + cls + ' style="' + bg + '">' + esc(col.header) + "</th>";
        }).join("");

        function playerRow(p) {
          return "<tr class=\"player-row\">" + COLUMNS.map(function (col) {
            if (col.isName) return '<td class="col-name">' + esc(p.displayName || p._id) + "</td>";
            return "<td>" + cellValue(col, p) + "</td>";
          }).join("") + "</tr>";
        }

        function teamHeader(name) {
          return '<tr class="team-row"><td class="col-name" colspan="' + COLUMNS.length + '">' + esc(name) + "</td></tr>";
        }

        var rows = "";
        if (t1.length)    { rows += teamHeader(teamOne);  rows += t1.map(playerRow).join(""); }
        if (t2.length)    { rows += teamHeader(teamTwo);  rows += t2.map(playerRow).join(""); }
        if (other.length) { rows += teamHeader("Other");  rows += other.map(playerRow).join(""); }

        if (!rows) {
          rows = '<tr><td colspan="' + COLUMNS.length + '" style="padding:20px;text-align:center;color:#666;">No player data available.</td></tr>';
        }

        return '<table class="stats-table"><thead><tr>' + thead + "</tr></thead><tbody>" + rows + "</tbody></table>";
      }

      function periodLabel(n, otCount) {
        if (n <= 3) return "Period " + n;
        var ot = n - 3;
        return otCount > 1 ? "OT " + ot : "Overtime";
      }

      function renderGame(gameId, data) {
        var summary = data.summary || {};
        var players = data.players || {};
        var periods  = data.periods  || null;

        var teamOne = summary.teamOne || "Team One";
        var teamTwo = summary.teamTwo || "Team Two";
        var winner  = summary.winner  || "";
        var t1wins  = winner === teamOne;
        var t2wins  = winner === teamTwo;

        document.title = esc(teamOne) + " vs " + esc(teamTwo) + " – Beersketball Stats";

        el.heroGameContent.innerHTML =
          '<div class="game-badge">Season ' + esc(summary.season || "--") +
            " &nbsp;·&nbsp; Night " + esc(summary.night || "--") +
            " &nbsp;·&nbsp; Game "  + esc(summary.game  || "--") + "</div>" +
          '<div class="matchup">' +
            '<div class="matchup-team">' +
              '<span class="matchup-team-name">' + esc(teamOne) + "</span>" +
              '<span class="matchup-team-result' + (t1wins ? " is-winner" : "") + '">' + (t1wins ? "✓ Winner" : "Final") + "</span>" +
            "</div>" +
            '<div class="matchup-score">' + esc(summary.teamOneScore || 0) + " – " + esc(summary.teamTwoScore || 0) + "</div>" +
            '<div class="matchup-team">' +
              '<span class="matchup-team-name">' + esc(teamTwo) + "</span>" +
              '<span class="matchup-team-result' + (t2wins ? " is-winner" : "") + '">' + (t2wins ? "✓ Winner" : "Final") + "</span>" +
            "</div>" +
          "</div>" +
          '<div class="game-meta-row">' +
            (summary.completedAt ? '<span><span class="game-meta-label">Completed</span>' + esc(fmtDate(summary.completedAt)) + "</span>" : "") +
            '<span><span class="game-meta-label">Players</span>' + esc(summary.numberOfPlayers || Object.keys(players).length) + "</span>" +
            '<span><span class="game-meta-label">Game ID</span>' + esc(gameId) + "</span>" +
          "</div>";

        el.fullGameTable.innerHTML = buildTable(players, teamOne, teamTwo);
        el.fullGameSection.classList.remove("is-hidden");

        if (periods && Object.keys(periods).length) {
          var keys = Object.keys(periods).map(Number).sort(function (a, b) { return a - b; });
          var otCount = keys.filter(function (n) { return n > 3; }).length;

          el.periodsContainer.innerHTML = keys.map(function (n) {
            var pPlayers = (periods[n] && periods[n].players) ? periods[n].players : {};
            var label = periodLabel(n, otCount);
            return (
              '<div class="period-section">' +
                '<div class="section-head"><h2 class="section-title">' + esc(label) + "</h2></div>" +
                '<div class="table-container"><div class="table-scroll">' +
                  buildTable(pPlayers, teamOne, teamTwo) +
                "</div></div>" +
              "</div>"
            );
          }).join("");
        } else {
          el.periodsContainer.innerHTML = "";
        }

        clearStatus();
      }

      function init() {
        var gameId = getParam("id");

        if (!gameId) {
          setStatus("No game ID in URL. Add ?id=SEASON-NIGHT-GAME (e.g. ?id=40-5-2).", "warning");
          el.heroGameContent.innerHTML = '<p style="color:rgba(255,255,255,0.65);margin:0;">No game selected.</p>';
          return;
        }

        setStatus("Loading game " + gameId + "…", "loading");

        firebase.initializeApp(firebaseConfig);

        firebase.database().ref("publicStats/games/" + gameId).get()
          .then(function (snap) {
            var data = snap && typeof snap.val === "function" ? snap.val() : null;
            if (!data) throw new Error("Game “" + gameId + "” not found.");
            renderGame(gameId, data);
          })
          .catch(function (err) {
            setStatus("Error: " + (err && err.message ? err.message : "Unknown error."), "error");
            el.heroGameContent.innerHTML = '<p style="color:rgba(255,255,255,0.65);margin:0;">Failed to load game data.</p>';
          });
      }

      init();
    })();
  </script>
</body>
</html>
